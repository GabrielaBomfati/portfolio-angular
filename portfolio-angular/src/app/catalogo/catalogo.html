@if (tecnologias$ | async; as tecnologias) {

  @if (tecnologias.length === 0) {
    <p>Nenhuma tecnologia cadastrada.</p>
  }

  @for (t of tecnologias; track t.id) {
    <mat-card style="margin-bottom: 12px;">
      <mat-card-header>
        <mat-card-title>{{ t.nome }}</mat-card-title>
        <mat-card-subtitle>{{ t.categoria }}</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <p>{{ t.descricao }}</p>
      </mat-card-content>
    </mat-card>
  } 
  }
@else {
  <p>Carregando catálogo...</p>
}
