


<mat-toolbar color="primary">

  <button mat-button (click)="menuLateral.toggle()">
    ☰
  </button>

  <span>Meu Portfólio</span>

  <span class="espacador"></span>

  <a
    mat-button
    routerLink="/"
    routerLinkActive="ativo"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    Início
  </a>

  <a
    mat-button
    routerLink="/sobre"
    routerLinkActive="ativo"
  >
    Sobre
  </a>

  <a
    mat-button
    routerLink="/projetos"
    routerLinkActive="ativo"
  >
    Projetos
  </a>

  <a
    mat-button
    routerLink="/catalogo"
    routerLinkActive="ativo"
  >
    Catálogo
  </a>

  <a
    mat-button
    routerLink="/contato"
    routerLinkActive="ativo"
  >
    Contato
  </a>

</mat-toolbar>

<mat-sidenav-container class="container">

  <mat-sidenav #menuLateral mode="side" opened>

    <a
      mat-button
      routerLink="/"
      routerLinkActive="ativo"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Início
    </a>

    <a
      mat-button
      routerLink="/sobre"
      routerLinkActive="ativo"
    >
      Sobre
    </a>

    <a
      mat-button
      routerLink="/projetos"
      routerLinkActive="ativo"
    >
      Projetos
    </a>

    <a
      mat-button
      routerLink="/catalogo"
      routerLinkActive="ativo"
    >
      Catálogo
    </a>

    <a
      mat-button
      routerLink="/contato"
      routerLinkActive="ativo"
    >
      Contato
    </a>

  </mat-sidenav>

  <mat-sidenav-content>

    <main style="padding: 24px;">
      <router-outlet></router-outlet>
    </main>

  </mat-sidenav-content>

</mat-sidenav-container>
